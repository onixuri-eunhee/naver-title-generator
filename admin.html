<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자</title>
<meta name="robots" content="noindex, nofollow">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:#0f172a; color:#e2e8f0; min-height:100vh; display:flex; align-items:center; justify-content:center; }
.card { background:#1e293b; border-radius:16px; padding:32px; width:100%; max-width:400px; margin:20px; }
h1 { font-size:18px; margin-bottom:24px; text-align:center; }
.field { margin-bottom:16px; }
label { display:block; font-size:12px; color:#94a3b8; margin-bottom:6px; }
input { width:100%; padding:10px 14px; border:1px solid #334155; border-radius:8px; background:#0f172a; color:#e2e8f0; font-size:14px; outline:none; }
input:focus { border-color:#3b82f6; }
.btn { width:100%; padding:12px; border:none; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; margin-bottom:8px; }
.btn-primary { background:#3b82f6; color:#fff; }
.btn-danger { background:#ef4444; color:#fff; }
.btn:disabled { opacity:0.5; cursor:not-allowed; }
.status { margin-top:16px; padding:12px; border-radius:8px; font-size:13px; display:none; }
.status.ok { display:block; background:#064e3b; color:#6ee7b7; }
.status.err { display:block; background:#7f1d1d; color:#fca5a5; }
.status.info { display:block; background:#1e3a5f; color:#93c5fd; }
.ip-display { text-align:center; font-size:12px; color:#64748b; margin-bottom:16px; }
</style>
</head>
<body>
<div class="card">
  <h1>🔐 관리자</h1>
  <div class="ip-display" id="ipDisplay">IP 확인 중...</div>
  <div class="field">
    <label>관리자 비밀번호</label>
    <input type="password" id="adminKey" placeholder="비밀번호 입력">
  </div>
  <button class="btn btn-primary" id="btnRegister" onclick="whitelist('POST')">✅ 내 IP 화이트리스트 등록</button>
  <button class="btn btn-danger" id="btnRemove" onclick="whitelist('DELETE')">❌ 화이트리스트 해제</button>
  <button class="btn" style="background:#334155; color:#e2e8f0;" onclick="checkStatus()">🔍 상태 확인</button>
  <div class="status" id="status"></div>
</div>
<script>
async function checkStatus() {
  var key = document.getElementById('adminKey').value;
  if (!key) { showStatus('비밀번호를 입력하세요', 'err'); return; }
  try {
    var res = await fetch('/api/admin?adminKey=' + encodeURIComponent(key));
    var data = await res.json();
    if (!res.ok) { showStatus(data.error, 'err'); return; }
    document.getElementById('ipDisplay').textContent = '내 IP: ' + data.ip;
    showStatus(data.whitelisted ? '✅ 화이트리스트 등록됨 (제한 없음)' : '⛔ 일반 사용자 (제한 적용 중)', data.whitelisted ? 'ok' : 'info');
  } catch(e) { showStatus('서버 오류', 'err'); }
}

async function whitelist(method) {
  var key = document.getElementById('adminKey').value;
  if (!key) { showStatus('비밀번호를 입력하세요', 'err'); return; }
  try {
    var res = await fetch('/api/admin', {
      method: method,
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ adminKey: key }),
    });
    var data = await res.json();
    if (!res.ok) { showStatus(data.error, 'err'); return; }
    document.getElementById('ipDisplay').textContent = '내 IP: ' + data.ip;
    showStatus(data.message, data.whitelisted ? 'ok' : 'info');
  } catch(e) { showStatus('서버 오류', 'err'); }
}

function showStatus(msg, type) {
  var el = document.getElementById('status');
  el.className = 'status ' + type;
  el.textContent = msg;
}
</script>
</body>
</html>
