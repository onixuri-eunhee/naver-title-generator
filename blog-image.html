<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans KR', sans-serif; background: #F8F9FD; color: #1A1A2E; line-height: 1.7; }

.navbar {
  background: #fff; border-bottom: 1px solid #E5E7EB;
  padding: 0 20px; display: flex; align-items: center;
  justify-content: space-between; height: 52px;
  position: sticky; top: 0; z-index: 100;
}
.navbar-logo { font-size: 18px; font-weight: 900; color: #1A1A2E; text-decoration: none; }
.navbar-logo span { color: #00C73C; }
.navbar-links { display: flex; gap: 4px; }
.navbar-links a {
  padding: 7px 14px; border-radius: 8px; font-size: 13px;
  font-weight: 500; color: #9CA3AF; text-decoration: none;
  transition: background 0.15s, color 0.15s;
}
.navbar-links a:hover { background: #F3F4F6; color: #1A1A2E; }
.navbar-links a.active { color: #8B5CF6; font-weight: 700; }

.hero {
  background: linear-gradient(135deg, #1A1A2E 0%, #16213E 50%, #0F3460 100%);
  padding: 48px 20px 40px; text-align: center;
}
.hero-badge {
  display: inline-block;
  background: rgba(139,92,246,0.15); color: #8B5CF6;
  border: 1px solid rgba(139,92,246,0.3);
  padding: 5px 14px; border-radius: 20px;
  font-size: 12px; font-weight: 700; margin-bottom: 18px; letter-spacing: 0.05em;
}
.hero h1 {
  font-size: clamp(22px, 4.5vw, 34px); font-weight: 700;
  color: #fff; line-height: 1.4; margin-bottom: 14px; letter-spacing: -0.5px;
}
.hero h1 em { color: #8B5CF6; font-style: normal; }
.hero p { color: rgba(255,255,255,0.6); font-size: 14px; max-width: 520px; margin: 0 auto; line-height: 1.8; }

.container { max-width: 860px; margin: 0 auto; padding: 32px 20px 80px; }

.card {
  background: #fff; border-radius: 16px; padding: 28px;
  border: 1px solid #E5E7EB; box-shadow: 0 2px 12px rgba(0,0,0,0.04);
  margin-bottom: 20px;
}
.card h2 { font-size: 16px; font-weight: 700; margin-bottom: 16px; }

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
@media(max-width: 580px) { .form-row { grid-template-columns: 1fr; } }

label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
select, input[type="text"], textarea {
  width: 100%; padding: 11px 14px; border: 1.5px solid #E5E7EB; border-radius: 8px;
  font-size: 14px; font-family: 'Noto Sans KR', sans-serif; color: #1A1A2E;
  background: #fff; outline: none; transition: border-color 0.2s;
}
textarea { resize: vertical; min-height: 80px; }
select:focus, input:focus, textarea:focus {
  border-color: #8B5CF6; box-shadow: 0 0 0 3px rgba(139,92,246,0.1);
}

.char-count { font-size: 11px; color: #9CA3AF; text-align: right; margin-top: 4px; }

.generate-btn {
  width: 100%; padding: 15px; margin-top: 8px;
  background: linear-gradient(135deg, #8B5CF6, #6D28D9); color: #fff;
  border: none; border-radius: 10px; font-family: 'Noto Sans KR', sans-serif;
  font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.2s;
}
.generate-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(139,92,246,0.35); }
.generate-btn:disabled { background: #9CA3AF; cursor: not-allowed; transform: none; box-shadow: none; }

.remaining { font-size: 12px; color: #9CA3AF; text-align: right; margin-top: 8px; }

/* 로딩 */
.loading { display: none; text-align: center; padding: 40px 20px; }
.loading.show { display: block; }
.loading-spinner {
  width: 40px; height: 40px; border: 3px solid #E5E7EB;
  border-top: 3px solid #8B5CF6; border-radius: 50%;
  animation: spin 0.8s linear infinite; margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 14px; color: #6B7280; }

/* 에러 */
.error-box { display: none; background: #FFF0F1; border: 1px solid #FECACA; border-radius: 10px; padding: 14px 18px; margin-bottom: 16px; font-size: 13px; color: #DC2626; }
.error-box.show { display: block; }

/* 결과 */
.result-area { display: none; }
.result-area.show { display: block; }

.image-grid {
  display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px;
}
@media(max-width: 580px) { .image-grid { grid-template-columns: 1fr; } }

.image-card {
  background: #fff; border-radius: 12px; overflow: hidden;
  border: 1px solid #E5E7EB; transition: all 0.2s;
}
.image-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
.image-card.thumbnail { grid-column: 1 / -1; }
.image-card img, .image-card canvas { width: 100%; display: block; }
.image-card-actions {
  padding: 10px 14px; display: flex; justify-content: space-between; align-items: center;
}
.image-label { font-size: 12px; color: #6B7280; }
.download-btn {
  padding: 6px 14px; background: #8B5CF6; color: #fff; border: none;
  border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif; transition: background 0.15s;
}
.download-btn:hover { background: #7C3AED; }

footer {
  text-align: center; padding: 28px 20px; font-size: 13px;
  color: #9CA3AF; border-top: 1px solid #E5E7EB; background: #fff;
}
footer a { color: #9CA3AF; text-decoration: none; margin: 0 8px; }
footer a:hover { text-decoration: underline; }

<div class="hero">
  <div class="hero-badge">🖼️ PRO 도구 · 블로그 이미지</div>
  <h1>블로그 주제만 입력하면<br><em>AI가 이미지를 만들어드립니다</em></h1>
  <p>FLUX AI로 블로그에 딱 맞는 고품질 이미지를 생성하고<br>썸네일 텍스트까지 자동으로 합성합니다</p>
</div>

<div class="container">

  <!-- 입력 폼 -->
  <div class="card">
    <h2>🎨 이미지 생성 설정</h2>

    <div style="margin-bottom:12px;">
      <label>블로그 주제</label>
      <textarea id="topicInput" placeholder="예: 강남 카페 인테리어, 자영업자 브랜딩 전략, 봄 나들이 코디..." maxlength="200"></textarea>
      <div class="char-count"><span id="topicCount">0</span>/200</div>
    </div>

    <div class="form-row">
      <div>
        <label>분위기 / 스타일</label>
        <select id="moodSelect">
          <option value="bright">밝고 깔끔한</option>
          <option value="warm">따뜻하고 아늑한</option>
          <option value="professional">전문적인</option>
          <option value="emotional">감성적인</option>
        </select>
      </div>
      <div>
        <label>이미지 개수</label>
        <select id="countSelect">
          <option value="4">4장</option>
          <option value="8">8장</option>
        </select>
      </div>
    </div>

    <div style="margin-bottom:12px;">
      <label>썸네일 텍스트 <span style="font-weight:400; color:#9CA3AF;">(선택사항, 첫 번째 이미지에 합성)</span></label>
      <input type="text" id="thumbnailText" placeholder="예: 카페 창업 비용 총정리" maxlength="30">
      <div class="char-count"><span id="thumbCount">0</span>/30</div>
    </div>

    <div class="error-box" id="errorBox"></div>

    <button class="generate-btn" id="generateBtn" onclick="generateImages()">🖼️ AI 이미지 생성하기</button>
    <div class="remaining" id="remainingCount">남은 횟수 확인 중...</div>
  </div>

  <!-- 로딩 -->
  <div class="loading" id="loadingArea">
    <div class="loading-spinner"></div>
    <div class="loading-text" id="loadingText">AI가 이미지를 생성하고 있습니다...</div>
  </div>

  <!-- 결과 -->
  <div class="result-area" id="resultArea">
    <div class="card">
      <h2>🖼️ 생성된 이미지</h2>
      <div class="image-grid" id="imageGrid"></div>
    </div>
  </div>

</div>

<script>
// 글자수 카운터
document.getElementById('topicInput').addEventListener('input', function() {
  document.getElementById('topicCount').textContent = this.value.length;
});
document.getElementById('thumbnailText').addEventListener('input', function() {
  document.getElementById('thumbCount').textContent = this.value.length;
});

// 남은 횟수 로드
async function loadRemaining() {
  try {
    var res = await fetch('/api/blog-image');
    var data = await res.json();
    var el = document.getElementById('remainingCount');
    if (data.admin) {
      el.textContent = '관리자 모드 (무제한)';
      el.style.color = '#3b82f6';
    } else if (data.limit === 0) {
      el.textContent = '현재 무료 사용이 제한되어 있습니다';
      el.style.color = '#FF4757';
      document.getElementById('generateBtn').disabled = true;
      document.getElementById('generateBtn').textContent = '사용 제한 중';
    } else {
      el.textContent = '오늘 남은 횟수: ' + data.remaining + '/' + data.limit + '회';
      if (data.remaining <= 1) el.style.color = '#FF4757';
      if (data.remaining <= 0) {
        document.getElementById('generateBtn').disabled = true;
        document.getElementById('generateBtn').textContent = '오늘 사용 한도 초과';
      }
    }
  } catch(e) {}
}
loadRemaining();

function showError(msg) {
  var box = document.getElementById('errorBox');
  box.textContent = msg;
  box.classList.add('show');
}

function hideError() {
  document.getElementById('errorBox').classList.remove('show');
}

async function generateImages() {
  var topic = document.getElementById('topicInput').value.trim();
  if (!topic) { showError('블로그 주제를 입력해주세요.'); return; }

  hideError();
  var btn = document.getElementById('generateBtn');
  btn.disabled = true;
  btn.textContent = '이미지 생성 중...';

  document.getElementById('loadingArea').classList.add('show');
  document.getElementById('resultArea').classList.remove('show');

  try {
    var mood = document.getElementById('moodSelect').value;
    var numImages = parseInt(document.getElementById('countSelect').value);
    var thumbnailText = document.getElementById('thumbnailText').value.trim();

    var res = await fetch('/api/blog-image', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ topic: topic, mood: mood, numImages: numImages, thumbnailText: thumbnailText }),
    });

    var data = await res.json();

    if (res.status === 429) {
      showError(data.error || '사용 한도를 초과했습니다.');
      btn.disabled = false;
      btn.textContent = '🖼️ AI 이미지 생성하기';
      document.getElementById('loadingArea').classList.remove('show');
      return;
    }

    if (!res.ok || !data.images || data.images.length === 0) {
      showError(data.error || '이미지 생성에 실패했습니다.');
      btn.disabled = false;
      btn.textContent = '🖼️ AI 이미지 생성하기';
      document.getElementById('loadingArea').classList.remove('show');
      return;
    }

    // 결과 렌더링
    await renderResults(data.images, thumbnailText);

    // 남은 횟수 업데이트
    var remainEl = document.getElementById('remainingCount');
    if (data.remaining >= 999) {
      remainEl.textContent = '관리자 모드 (무제한)';
      remainEl.style.color = '#3b82f6';
    } else if (data.limit > 0) {
      remainEl.textContent = '오늘 남은 횟수: ' + Math.max(data.remaining, 0) + '/' + data.limit + '회';
      if (data.remaining <= 1) remainEl.style.color = '#FF4757';
    }

    document.getElementById('loadingArea').classList.remove('show');
    document.getElementById('resultArea').classList.add('show');
    document.getElementById('resultArea').scrollIntoView({ behavior: 'smooth', block: 'start' });

  } catch (e) {
    showError('서버 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
    document.getElementById('loadingArea').classList.remove('show');
  }

  btn.disabled = false;
  btn.textContent = '🖼️ AI 이미지 생성하기';
}

async function renderResults(images, thumbnailText) {
  var grid = document.getElementById('imageGrid');
  grid.innerHTML = '';

  for (var i = 0; i < images.length; i++) {
    var isThumbnail = (i === 0 && thumbnailText);
    var card = document.createElement('div');
    card.className = 'image-card' + (isThumbnail ? ' thumbnail' : '');

    if (isThumbnail) {
      // Canvas로 텍스트 오버레이
      var canvas = document.createElement('canvas');
      canvas.width = 1024;
      canvas.height = 1024;
      canvas.style.width = '100%';
      card.appendChild(canvas);
      renderThumbnailCanvas(canvas, images[i].url, thumbnailText);
    } else {
      var img = document.createElement('img');
      img.src = images[i].url;
      img.alt = '블로그 이미지 ' + (i + 1);
      img.loading = 'lazy';
      card.appendChild(img);
    }

    var actions = document.createElement('div');
    actions.className = 'image-card-actions';

    var labelEl = document.createElement('span');
    labelEl.className = 'image-label';
    labelEl.textContent = isThumbnail ? '썸네일 (텍스트 합성)' : '이미지 ' + (i + 1);

    var dlBtn = document.createElement('button');
    dlBtn.className = 'download-btn';
    dlBtn.textContent = '다운로드';
    dlBtn.setAttribute('data-index', i);
    dlBtn.setAttribute('data-url', images[i].url);
    dlBtn.setAttribute('data-thumbnail', isThumbnail ? '1' : '0');
    dlBtn.onclick = function() { downloadImage(this); };

    actions.appendChild(labelEl);
    actions.appendChild(dlBtn);
    card.appendChild(actions);
    grid.appendChild(card);
  }
}

function renderThumbnailCanvas(canvas, imageUrl, text) {
  var ctx = canvas.getContext('2d');
  var img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = function() {
    ctx.drawImage(img, 0, 0, 1024, 1024);

    // 하단 반투명 검정 그라데이션
    var grad = ctx.createLinearGradient(0, 1024 * 0.6, 0, 1024);
    grad.addColorStop(0, 'rgba(0,0,0,0)');
    grad.addColorStop(1, 'rgba(0,0,0,0.65)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 1024 * 0.6, 1024, 1024 * 0.4);

    // 텍스트 (Noto Sans KR)
    document.fonts.ready.then(function() {
      var fontSize = 52;
      ctx.font = '900 ' + fontSize + 'px "Noto Sans KR"';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      // 폰트 사이즈 자동 축소
      while (ctx.measureText(text).width > 900 && fontSize > 24) {
        fontSize -= 2;
        ctx.font = '900 ' + fontSize + 'px "Noto Sans KR"';
      }

      // 텍스트 그림자
      ctx.shadowColor = 'rgba(0,0,0,0.5)';
      ctx.shadowBlur = 8;
      ctx.shadowOffsetX = 2;
      ctx.shadowOffsetY = 2;

      ctx.fillStyle = '#FFFFFF';
      ctx.fillText(text, 512, 1024 * 0.85);

      // 그림자 초기화
      ctx.shadowColor = 'transparent';
      ctx.shadowBlur = 0;
    });
  };
  img.src = imageUrl;
}

function downloadImage(btn) {
  var index = parseInt(btn.getAttribute('data-index'));
  var url = btn.getAttribute('data-url');
  var isThumbnail = btn.getAttribute('data-thumbnail') === '1';

  if (isThumbnail) {
    // Canvas에서 다운로드 (텍스트 합성본)
    var canvas = document.querySelector('.image-card.thumbnail canvas');
    if (canvas) {
      canvas.toBlob(function(blob) {
        var a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'thumbnail.png';
        a.click();
        URL.revokeObjectURL(a.href);
      }, 'image/png');
    }
  } else {
    // 일반 이미지 다운로드
    var a = document.createElement('a');
    a.href = url;
    a.download = 'blog-image-' + (index + 1) + '.png';
    a.target = '_blank';
    a.click();
  }
}
</script>
