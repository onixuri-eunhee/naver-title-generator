<script>
var token = localStorage.getItem('ddukddak_token');
var allKeywords = [];
var currentSort = { key: 'score', asc: false };

// 남은 횟수 체크 (로그인 여부 확인)
(function() {
  if (!token) {
    document.getElementById('remainingBar').textContent = '로그인 후 이용 가능합니다';
    document.getElementById('remainingBar').className = 'remaining blocked';
    document.getElementById('genBtn').disabled = true;
    document.getElementById('genBtn').textContent = '로그인 필요';
  } else {
    document.getElementById('remainingBar').textContent = '1일 3회 무료';
    document.getElementById('remainingBar').className = 'remaining';
  }
})();

function updateQuestionCount() {
  var lines = document.getElementById('questionsInput').value.split('\n').filter(function(l) { return l.trim().length > 0; });
  var count = Math.min(lines.length, 10);
  document.getElementById('questionCount').textContent = count + '/10';
  if (lines.length > 10) {
    document.getElementById('questionCount').style.color = '#DC2626';
  } else {
    document.getElementById('questionCount').style.color = '#9CA3AF';
  }
}

function showError(msg) {
  var box = document.getElementById('errorBox');
  box.textContent = msg;
  box.classList.add('show');
}
function hideError() {
  document.getElementById('errorBox').classList.remove('show');
}

function setProgress(pct, text) {
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = text;
}

async function findKeywords() {
  var field = document.getElementById('fieldInput').value.trim();
  var role = document.getElementById('roleInput').value.trim();
  var target = document.getElementById('targetInput').value.trim();
  var questions = document.getElementById('questionsInput').value.trim();

  // 질문 10개 제한
  if (questions) {
    var lines = questions.split('\n').filter(function(l) { return l.trim().length > 0; });
    if (lines.length > 10) {
      questions = lines.slice(0, 10).join('\n');
    }
  }

  hideError();
  if (!field) { showError('내 분야를 입력해주세요.'); return; }
  if (!role) { showError('"나는" 항목을 입력해주세요.'); return; }
  if (!target) { showError('타겟 독자를 입력해주세요.'); return; }

  var btn = document.getElementById('genBtn');
  btn.disabled = true;
  btn.textContent = '분석 중...';

  document.getElementById('progressWrap').classList.add('show');
  document.getElementById('resultSection').classList.remove('show');

  // 프로그레스 시뮬레이션
  setProgress(10, '[1/4] AI가 시드키워드를 생성하고 있습니다...');
  var progressTimer = setInterval(function() {
    var fill = document.getElementById('progressFill');
    var current = parseFloat(fill.style.width) || 10;
    if (current < 85) {
      current += Math.random() * 3;
      fill.style.width = current + '%';
      if (current > 25 && current < 50) document.getElementById('progressText').textContent = '[2/4] 네이버에서 키워드를 확장하고 있습니다...';
      else if (current > 50 && current < 70) document.getElementById('progressText').textContent = '[3/4] 검색 트렌드를 분석하고 있습니다...';
      else if (current > 70) document.getElementById('progressText').textContent = '[4/4] 황금키워드를 선별하고 있습니다...';
    }
  }, 500);

  try {
    var headers = { 'Content-Type': 'application/json' };
    if (token) headers['Authorization'] = 'Bearer ' + token;

    var res = await fetch('/api/keywords', {
      method: 'POST',
      headers: headers,
      body: JSON.stringify({ field: field, role: role, target: target, questions: questions }),
    });
    var data = await res.json();

    clearInterval(progressTimer);

    if (!res.ok) {
      showError(data.error || '키워드 분석에 실패했습니다.');
      btn.disabled = false;
      btn.textContent = '황금키워드 찾기';
      document.getElementById('progressWrap').classList.remove('show');
      return;
    }

    setProgress(100, '완료!');
    setTimeout(function() { document.getElementById('progressWrap').classList.remove('show'); }, 800);

    // 결과 표시
    allKeywords = data.keywords || [];
    renderTopKeywords(allKeywords.slice(0, 10));
    renderTable(allKeywords);
    document.getElementById('totalCount').textContent = allKeywords.length;
    document.getElementById('resultSection').classList.add('show');

    // 남은 횟수 업데이트
    if (data.remaining !== undefined) {
      var el = document.getElementById('remainingBar');
      if (data.remaining >= 999) {
        el.textContent = '관리자 모드 (무제한)';
        el.className = 'remaining admin';
      } else if (data.remaining <= 0) {
        el.textContent = '오늘 사용 한도를 모두 사용했어요. 내일 다시 오세요!';
        el.className = 'remaining blocked';
      } else {
        el.textContent = '오늘 ' + (data.limit - data.remaining) + '/' + data.limit + '회 사용 | 잔여: ' + data.remaining + '회';
        el.className = 'remaining';
      }
    }

  } catch (e) {
    clearInterval(progressTimer);
    showError('서버 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
    document.getElementById('progressWrap').classList.remove('show');
  }

  btn.disabled = false;
  btn.textContent = '황금키워드 찾기';
}

function competitionBadge(comp) {
  var labels = { low: '낮음', medium: '중간', high: '높음' };
  return '<span class="badge ' + comp + '">' + (labels[comp] || comp) + '</span>';
}

function trendBadge(trend, change) {
  var arrow = trend === 'rising' ? '&#9650;' : trend === 'falling' ? '&#9660;' : '&#8212;';
  var label = trend === 'rising' ? '상승' : trend === 'falling' ? '하락' : '유지';
  var changeStr = change ? ' ' + (change > 0 ? '+' : '') + change + '%' : '';
  return '<span class="badge ' + trend + '">' + arrow + ' ' + label + changeStr + '</span>';
}

function renderTopKeywords(keywords) {
  var container = document.getElementById('topKeywords');
  container.innerHTML = keywords.map(function(kw, i) {
    return '<div class="kw-card">' +
      '<div class="kw-card-header">' +
        '<div class="kw-rank">' + (i + 1) + '</div>' +
        '<div class="kw-score">' + kw.score + '<span>/100</span></div>' +
      '</div>' +
      '<div class="kw-name">' + kw.keyword + '</div>' +
      '<div class="kw-stats">' +
        '<div class="kw-stat">검색수 <b>' + kw.monthlySearch.toLocaleString() + '</b></div>' +
        '<div class="kw-stat">경쟁도 ' + competitionBadge(kw.competition) + '</div>' +
        '<div class="kw-stat">포화도 <b>' + kw.saturation + '</b></div>' +
        '<div class="kw-stat">트렌드 ' + trendBadge(kw.trend, kw.trendChange) + '</div>' +
      '</div>' +
      '<a class="blog-link-btn" href="blog-writer.html?topic=' + encodeURIComponent(kw.keyword) + '">이 키워드로 블로그 글 쓰기</a>' +
    '</div>';
  }).join('');
}

function renderTable(keywords) {
  var tbody = document.getElementById('tableBody');
  tbody.innerHTML = keywords.map(function(kw) {
    return '<tr>' +
      '<td><b style="color:#ff5f1f;">' + kw.score + '</b></td>' +
      '<td>' + kw.keyword + '</td>' +
      '<td>' + kw.monthlySearch.toLocaleString() + '</td>' +
      '<td>' + competitionBadge(kw.competition) + '</td>' +
      '<td>' + kw.saturation + '</td>' +
      '<td>' + trendBadge(kw.trend, kw.trendChange) + '</td>' +
      '<td><a href="blog-writer.html?topic=' + encodeURIComponent(kw.keyword) + '" style="color:#ff5f1f; font-size:12px; font-weight:600; text-decoration:none;">글쓰기</a></td>' +
    '</tr>';
  }).join('');
}

function sortTable(key) {
  if (currentSort.key === key) {
    currentSort.asc = !currentSort.asc;
  } else {
    currentSort.key = key;
    currentSort.asc = false;
  }

  allKeywords.sort(function(a, b) {
    var va = a[key], vb = b[key];
    if (typeof va === 'string') { va = va.toLowerCase(); vb = vb.toLowerCase(); }
    if (va < vb) return currentSort.asc ? -1 : 1;
    if (va > vb) return currentSort.asc ? 1 : -1;
    return 0;
  });

  renderTable(allKeywords);
}

function downloadCSV() {
  if (allKeywords.length === 0) return;
  var headers = ['키워드', '점수', '월간검색수', 'PC검색수', '모바일검색수', '경쟁도', '블로그발행량', '포화도', '트렌드', '트렌드변화율'];
  var rows = allKeywords.map(function(kw) {
    return [kw.keyword, kw.score, kw.monthlySearch, kw.pcSearch, kw.mobileSearch, kw.competition, kw.blogCount, kw.saturation, kw.trend, kw.trendChange];
  });
  var csv = '\uFEFF' + headers.join(',') + '\n' + rows.map(function(r) { return r.join(','); }).join('\n');
  var blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'golden_keywords_' + new Date().toISOString().slice(0, 10) + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}
</script>

</html>
