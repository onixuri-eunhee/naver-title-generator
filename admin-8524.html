<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 대시보드 - 뚝딱툴</title>
<meta name="robots" content="noindex, nofollow">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Noto Sans KR',-apple-system,BlinkMacSystemFont,sans-serif; background:#0f172a; color:#e2e8f0; min-height:100vh; }
.header { background:#1e293b; border-bottom:1px solid #334155; padding:16px 24px; display:flex; align-items:center; justify-content:space-between; }
.header h1 { font-size:18px; }
.header .badge { font-size:11px; background:#3b82f6; color:#fff; padding:2px 8px; border-radius:4px; margin-left:8px; }
.header-right { display:flex; align-items:center; gap:12px; }
.session-timer { font-size:11px; color:#94a3b8; }
.container { max-width:1200px; margin:0 auto; padding:24px; }

/* 인증 */
.auth-card { background:#1e293b; border-radius:12px; padding:32px; max-width:400px; margin:80px auto; }
.auth-card input { width:100%; padding:10px 14px; border:1px solid #334155; border-radius:8px; background:#0f172a; color:#e2e8f0; font-size:14px; margin-top:8px; }
.auth-card button { width:100%; padding:12px; border:none; border-radius:8px; background:#3b82f6; color:#fff; font-size:14px; font-weight:600; cursor:pointer; margin-top:12px; }
.auth-card .error { color:#f87171; font-size:13px; margin-top:8px; }

/* 요약 카드 */
.stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:16px; margin-bottom:24px; }
.stat-card { background:#1e293b; border-radius:12px; padding:20px; }
.stat-card .label { font-size:12px; color:#94a3b8; margin-bottom:4px; }
.stat-card .value { font-size:28px; font-weight:700; }
.stat-card .value.blue { color:#60a5fa; }
.stat-card .value.green { color:#4ade80; }
.stat-card .value.amber { color:#fbbf24; }
.stat-card .value.purple { color:#a78bfa; }

/* 차트 */
.charts-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:24px; }
@media (max-width:768px) { .charts-grid { grid-template-columns:1fr; } }
.chart-card { background:#1e293b; border-radius:12px; padding:20px; }
.chart-card h3 { font-size:14px; color:#94a3b8; margin-bottom:12px; }

/* 테이블 */
.table-card { background:#1e293b; border-radius:12px; padding:20px; margin-bottom:24px; }
.table-card h3 { font-size:14px; color:#94a3b8; margin-bottom:12px; }
.search-bar { display:flex; gap:8px; margin-bottom:12px; }
.search-bar input { flex:1; padding:8px 12px; border:1px solid #334155; border-radius:8px; background:#0f172a; color:#e2e8f0; font-size:13px; }
.search-bar button { padding:8px 16px; border:none; border-radius:8px; background:#3b82f6; color:#fff; font-size:13px; cursor:pointer; }
table { width:100%; border-collapse:collapse; font-size:13px; }
th { text-align:left; padding:8px 12px; border-bottom:1px solid #334155; color:#94a3b8; font-weight:600; }
td { padding:8px 12px; border-bottom:1px solid #1e293b; }
tr:hover { background:#1e293b80; }
.pagination { display:flex; gap:8px; justify-content:center; margin-top:12px; }
.pagination button { padding:6px 12px; border:1px solid #334155; border-radius:6px; background:transparent; color:#e2e8f0; cursor:pointer; font-size:12px; }
.pagination button.active { background:#3b82f6; border-color:#3b82f6; }
.pagination button:disabled { opacity:0.3; cursor:not-allowed; }

/* 크레딧 관리 */
.credit-actions { display:flex; gap:8px; align-items:center; }
.credit-actions input { width:80px; padding:4px 8px; border:1px solid #334155; border-radius:6px; background:#0f172a; color:#e2e8f0; font-size:12px; text-align:center; }
.credit-actions button { padding:4px 10px; border:none; border-radius:6px; font-size:11px; font-weight:600; cursor:pointer; }
.credit-actions .btn-add { background:#10b981; color:#fff; }
.credit-actions .btn-sub { background:#ef4444; color:#fff; }
.credit-result { font-size:11px; margin-left:8px; }
.credit-result.ok { color:#4ade80; }
.credit-result.err { color:#f87171; }

/* 로그 */
.log-row { display:flex; gap:12px; padding:6px 0; border-bottom:1px solid #1e293b20; font-size:12px; }
.log-time { color:#64748b; min-width:140px; }
.log-tool { padding:2px 6px; border-radius:4px; font-size:11px; font-weight:600; }
.log-tool.title { background:#3b82f620; color:#60a5fa; }
.log-tool.hook { background:#f59e0b20; color:#fbbf24; }
.log-tool.thread { background:#8b5cf620; color:#a78bfa; }
.log-tool.blog { background:#10b98120; color:#34d399; }
.log-tool.image { background:#ec489920; color:#f472b6; }
.log-tool.image-pro { background:#f4389920; color:#fb7185; }
.log-tool.card-news { background:#06b6d420; color:#22d3ee; }
.log-email { color:#94a3b8; }

.hidden { display:none; }
.loading { text-align:center; padding:40px; color:#64748b; }
</style>
</head>
<body>

<!-- 인증 화면 -->
<div id="authScreen" class="auth-card">
  <h2 style="text-align:center; margin-bottom:16px;">관리자 대시보드</h2>
  <p style="font-size:13px; color:#94a3b8; text-align:center; margin-bottom:16px;">관리자 계정으로 로그인하세요</p>
  <input type="email" id="authEmail" placeholder="이메일">
  <input type="password" id="authPassword" placeholder="비밀번호" style="margin-top:8px;">
  <button onclick="login()">로그인</button>
  <div class="error hidden" id="authError"></div>
</div>

<!-- 대시보드 -->
<div id="dashboard" class="hidden">
  <div class="header">
    <div style="display:flex;align-items:center;">
      <h1>뚝딱툴 관리자</h1>
      <span class="badge">ADMIN</span>
    </div>
    <div class="header-right">
      <span class="session-timer" id="sessionTimer"></span>
      <button onclick="logout()" style="padding:6px 12px; border:1px solid #475569; border-radius:6px; background:transparent; color:#94a3b8; cursor:pointer; font-size:12px;">로그아웃</button>
    </div>
  </div>

  <div class="container">
    <!-- 요약 -->
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card"><div class="label">총 가입자</div><div class="value blue" id="statTotal">-</div></div>
      <div class="stat-card"><div class="label">오늘 가입</div><div class="value green" id="statToday">-</div></div>
      <div class="stat-card"><div class="label">오늘 생성</div><div class="value amber" id="statUsage">-</div></div>
      <div class="stat-card"><div class="label">주간 활성 (7일)</div><div class="value purple" id="statActive">-</div></div>
    </div>

    <!-- 차트 -->
    <div class="charts-grid">
      <div class="chart-card">
        <h3>일별 가입 추이 (30일)</h3>
        <canvas id="signupChart"></canvas>
      </div>
      <div class="chart-card">
        <h3>도구별 사용량 (30일)</h3>
        <canvas id="toolChart"></canvas>
      </div>
      <div class="chart-card">
        <h3>일별 사용량 추이 (30일)</h3>
        <canvas id="usageChart"></canvas>
      </div>
    </div>

    <!-- 사용자 목록 + 크레딧 관리 -->
    <div class="table-card">
      <h3>사용자 목록</h3>
      <div class="search-bar">
        <input type="text" id="userSearch" placeholder="이메일 또는 이름 검색..." onkeyup="if(event.key==='Enter')searchUsers()">
        <button onclick="searchUsers()">검색</button>
      </div>
      <table>
        <thead><tr><th>#</th><th>이메일</th><th>이름</th><th>전화번호</th><th>크레딧</th><th>가입일</th><th>크레딧 관리</th></tr></thead>
        <tbody id="usersBody"></tbody>
      </table>
      <div class="pagination" id="usersPagination"></div>
    </div>

    <!-- 최근 사용 로그 -->
    <div class="table-card">
      <h3>최근 사용 로그 (50건)</h3>
      <div id="logsContainer"></div>
    </div>
  </div>
</div>

<script>
// XSS 방지: 모든 동적 텍스트를 이스케이프
function esc(str) {
  if (str == null) return '';
  var d = document.createElement('div');
  d.textContent = String(str);
  return d.innerHTML;
}

var token = null;
var currentPage = 1;
var ADMIN_SESSION_LIMIT = 2 * 60 * 60 * 1000; // 2시간
var adminLoginTime = null;
var sessionInterval = null;

// 저장된 admin 세션 복원
(function initSession() {
  var saved = sessionStorage.getItem('admin_session');
  if (saved) {
    try {
      var s = JSON.parse(saved);
      var elapsed = Date.now() - s.loginTime;
      if (elapsed < ADMIN_SESSION_LIMIT) {
        token = s.token;
        adminLoginTime = s.loginTime;
        checkAdmin();
        return;
      }
    } catch(e) {}
    sessionStorage.removeItem('admin_session');
  }
  document.getElementById('authScreen').classList.remove('hidden');
})();

function startSessionTimer() {
  if (sessionInterval) clearInterval(sessionInterval);
  sessionInterval = setInterval(function() {
    if (!adminLoginTime) return;
    var remaining = ADMIN_SESSION_LIMIT - (Date.now() - adminLoginTime);
    if (remaining <= 0) {
      logout();
      alert('관리자 세션이 만료되었습니다. 다시 로그인해주세요.');
      return;
    }
    var min = Math.floor(remaining / 60000);
    var sec = Math.floor((remaining % 60000) / 1000);
    document.getElementById('sessionTimer').textContent =
      '세션 ' + min + ':' + (sec < 10 ? '0' : '') + sec;
  }, 1000);
}

async function login() {
  var email = document.getElementById('authEmail').value.trim();
  var pw = document.getElementById('authPassword').value;
  var errEl = document.getElementById('authError');
  errEl.classList.add('hidden');

  if (!email || !pw) { errEl.textContent = '이메일과 비밀번호를 입력하세요.'; errEl.classList.remove('hidden'); return; }

  try {
    var res = await fetch('/api/auth?action=login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email, password: pw }),
    });
    var data = await res.json();
    if (!res.ok) { errEl.textContent = data.error; errEl.classList.remove('hidden'); return; }
    token = data.token;
    adminLoginTime = Date.now();
    // sessionStorage 사용 (탭 닫으면 자동 소멸, localStorage보다 안전)
    sessionStorage.setItem('admin_session', JSON.stringify({ token: token, loginTime: adminLoginTime }));
    checkAdmin();
  } catch (e) {
    errEl.textContent = '서버 오류'; errEl.classList.remove('hidden');
  }
}

async function checkAdmin() {
  try {
    var res = await fetch('/api/auth?action=me', { headers: { 'Authorization': 'Bearer ' + token } });
    var data = await res.json();
    if (!res.ok || !data.isAdmin) {
      document.getElementById('authError').textContent = '관리자 권한이 없습니다.';
      document.getElementById('authError').classList.remove('hidden');
      document.getElementById('authScreen').classList.remove('hidden');
      sessionStorage.removeItem('admin_session');
      return;
    }
    document.getElementById('authScreen').classList.add('hidden');
    document.getElementById('dashboard').classList.remove('hidden');
    startSessionTimer();
    loadDashboard();
  } catch (e) {
    document.getElementById('authScreen').classList.remove('hidden');
    sessionStorage.removeItem('admin_session');
  }
}

function logout() {
  sessionStorage.removeItem('admin_session');
  token = null;
  adminLoginTime = null;
  if (sessionInterval) clearInterval(sessionInterval);
  document.getElementById('dashboard').classList.add('hidden');
  document.getElementById('authScreen').classList.remove('hidden');
  document.getElementById('authEmail').value = '';
  document.getElementById('authPassword').value = '';
}

function apiHeaders() {
  return { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };
}

async function loadDashboard() {
  loadStats();
  loadUsers(1);
  loadLogs();
}

async function loadStats() {
  try {
    var res = await fetch('/api/admin-dashboard?action=stats', { headers: apiHeaders() });
    var data = await res.json();
    if (!res.ok) return;

    document.getElementById('statTotal').textContent = data.summary.totalUsers.toLocaleString();
    document.getElementById('statToday').textContent = data.summary.todaySignups.toLocaleString();
    document.getElementById('statUsage').textContent = data.summary.todayUsage.toLocaleString();
    document.getElementById('statActive').textContent = data.summary.weeklyActive.toLocaleString();

    // 가입 추이 차트
    new Chart(document.getElementById('signupChart'), {
      type: 'line',
      data: {
        labels: data.signupTrend.map(function(r) { return r.date.slice(5); }),
        datasets: [{ label: '가입', data: data.signupTrend.map(function(r) { return r.count; }), borderColor: '#60a5fa', backgroundColor: '#60a5fa20', fill: true, tension: 0.3 }]
      },
      options: chartOpts()
    });

    // 도구별 차트
    var toolColors = { title:'#60a5fa', hook:'#fbbf24', thread:'#a78bfa', blog:'#34d399', image:'#f472b6', 'image-pro':'#fb7185', 'card-news':'#22d3ee', keyword:'#f97316', shortform:'#8b5cf6' };
    new Chart(document.getElementById('toolChart'), {
      type: 'doughnut',
      data: {
        labels: data.toolUsage.map(function(r) { return r.tool; }),
        datasets: [{ data: data.toolUsage.map(function(r) { return r.count; }), backgroundColor: data.toolUsage.map(function(r) { return toolColors[r.tool] || '#64748b'; }) }]
      },
      options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8', font: { size: 11 } } } } }
    });

    // 사용량 추이 차트
    new Chart(document.getElementById('usageChart'), {
      type: 'bar',
      data: {
        labels: data.usageTrend.map(function(r) { return r.date.slice(5); }),
        datasets: [{ label: '생성', data: data.usageTrend.map(function(r) { return r.count; }), backgroundColor: '#fbbf2480', borderColor: '#fbbf24', borderWidth: 1 }]
      },
      options: chartOpts()
    });
  } catch (e) {}
}

function chartOpts() {
  return {
    responsive: true,
    plugins: { legend: { display: false } },
    scales: {
      x: { ticks: { color: '#64748b', font: { size: 10 } }, grid: { color: '#1e293b' } },
      y: { ticks: { color: '#64748b', font: { size: 10 } }, grid: { color: '#1e293b' }, beginAtZero: true }
    }
  };
}

async function loadUsers(page) {
  currentPage = page;
  var search = document.getElementById('userSearch').value;
  var url = '/api/admin-dashboard?action=users&page=' + page + '&limit=20';
  if (search) url += '&search=' + encodeURIComponent(search);

  try {
    var res = await fetch(url, { headers: apiHeaders() });
    var data = await res.json();
    if (!res.ok) return;

    var tbody = document.getElementById('usersBody');
    tbody.innerHTML = data.users.map(function(u, i) {
      var num = (data.pagination.page - 1) * data.pagination.limit + i + 1;
      var date = new Date(u.created_at).toLocaleDateString('ko-KR');
      var emailEsc = esc(u.email);
      return '<tr>' +
        '<td>' + num + '</td>' +
        '<td>' + emailEsc + '</td>' +
        '<td>' + esc(u.name || '-') + '</td>' +
        '<td>' + esc(u.phone || '-') + '</td>' +
        '<td id="credit-' + num + '">' + esc(String(u.credits)) + '</td>' +
        '<td>' + esc(date) + '</td>' +
        '<td><div class="credit-actions">' +
          '<input type="number" id="amt-' + num + '" value="1" min="1" max="9999">' +
          '<button class="btn-add" onclick="adjustCredit(\'' + emailEsc + '\',' + num + ',1)">+</button>' +
          '<button class="btn-sub" onclick="adjustCredit(\'' + emailEsc + '\',' + num + ',-1)">-</button>' +
          '<span class="credit-result" id="cr-' + num + '"></span>' +
        '</div></td></tr>';
    }).join('');

    // 페이지네이션
    var pg = data.pagination;
    var pgEl = document.getElementById('usersPagination');
    var html = '';
    html += '<button ' + (pg.page <= 1 ? 'disabled' : 'onclick="loadUsers(' + (pg.page - 1) + ')"') + '>&lt;</button>';
    for (var p = 1; p <= pg.pages; p++) {
      html += '<button class="' + (p === pg.page ? 'active' : '') + '" onclick="loadUsers(' + p + ')">' + p + '</button>';
    }
    html += '<button ' + (pg.page >= pg.pages ? 'disabled' : 'onclick="loadUsers(' + (pg.page + 1) + ')"') + '>&gt;</button>';
    pgEl.innerHTML = html;
  } catch (e) {}
}

function searchUsers() { loadUsers(1); }

async function adjustCredit(email, rowNum, direction) {
  var amtInput = document.getElementById('amt-' + rowNum);
  var resultEl = document.getElementById('cr-' + rowNum);
  var amount = parseInt(amtInput.value, 10);
  if (!amount || amount < 1) { resultEl.textContent = '1 이상'; resultEl.className = 'credit-result err'; return; }

  var delta = amount * direction;
  resultEl.textContent = '...';
  resultEl.className = 'credit-result';

  try {
    var res = await fetch('/api/admin-dashboard?action=credit', {
      method: 'POST',
      headers: apiHeaders(),
      body: JSON.stringify({ email: email, delta: delta }),
    });
    var data = await res.json();
    if (!res.ok) { resultEl.textContent = data.error || '실패'; resultEl.className = 'credit-result err'; return; }
    document.getElementById('credit-' + rowNum).textContent = data.newCredits;
    resultEl.textContent = (delta > 0 ? '+' : '') + delta + ' 완료';
    resultEl.className = 'credit-result ok';
    setTimeout(function() { resultEl.textContent = ''; }, 3000);
  } catch (e) {
    resultEl.textContent = '서버 오류'; resultEl.className = 'credit-result err';
  }
}

async function loadLogs() {
  try {
    var res = await fetch('/api/admin-dashboard?action=logs&limit=50', { headers: apiHeaders() });
    var data = await res.json();
    if (!res.ok) return;

    var container = document.getElementById('logsContainer');
    container.innerHTML = data.logs.map(function(log) {
      var time = new Date(log.created_at).toLocaleString('ko-KR', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
      var tool = esc(log.tool || 'unknown');
      return '<div class="log-row">' +
        '<span class="log-time">' + esc(time) + '</span>' +
        '<span class="log-tool ' + tool + '">' + tool + (log.mode ? ':' + esc(log.mode) : '') + '</span>' +
        '<span class="log-email">' + esc(log.user_email || log.ip || '-') + '</span>' +
        '</div>';
    }).join('');
  } catch (e) {}
}
</script>
</body>
</html>
