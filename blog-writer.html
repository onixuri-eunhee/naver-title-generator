<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-C61VWMGQ8R"></script>
  <script>

    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-C61VWMGQ8R');

  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4973804132466200" crossorigin="anonymous"></script>
  <title>블로그 글 작성기 | 상위노출 블로그 글, 뚝딱</title>
  <meta name="description" content="네이버 홈피드, 네이버 SEO, 구글 SEO에 최적화된 블로그 글을 AI로 자동 생성합니다. 업종과 키워드만 입력하면 상위노출 글 완성." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://ddukddaktool.co.kr/blog-writer.html" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #101010;
      --card: #1a1a1a;
      --border: #2a2a2a;
      --text: #f2f2f2;
      --muted: #888;
      --accent: #ff5f1f;
      --accent-light: rgba(255,95,31,0.12);
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ===== HEADER / NAV ===== */
    header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo { font-size: 16px; font-weight: 700; color: var(--text); text-decoration: none; }
    .logo em { color: var(--accent); font-style: normal; }
    .nav-links { display: flex; gap: 20px; }
    .nav-links a { font-size: 13px; color: var(--muted); text-decoration: none; transition: color 0.2s; }
    .nav-links a:hover { color: var(--text); }
    .nav-links a.active { color: var(--accent); font-weight: 600; }

    /* ===== MAIN ===== */
    main {
      max-width: 640px;
      margin: 0 auto;
      padding: 48px 20px 100px;
    }

    /* ===== PAGE HEADER ===== */
    .page-header { text-align: center; margin-bottom: 36px; }
    .page-header h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 8px; }
    .page-header p { font-size: 14px; color: var(--muted); line-height: 1.7; }

    /* ===== CARD ===== */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 12px;
    }
    .card-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 14px;
    }

    /* ===== TYPE GRID (3-col for type, 2x2 for tone) ===== */
    .type-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .type-grid.three-col {
      grid-template-columns: 1fr 1fr 1fr;
    }
    .type-btn {
      padding: 13px 14px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.18s;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 3px;
      text-align: left;
    }
    .type-btn .type-icon { font-size: 20px; margin-bottom: 2px; }
    .type-btn .type-name { font-weight: 600; color: var(--text); font-size: 13px; }
    .type-btn .type-desc { font-size: 11px; color: var(--muted); line-height: 1.4; }
    .type-btn:hover { border-color: var(--accent); background: var(--accent-light); }
    .type-btn.active { border-color: var(--accent); background: var(--accent-light); }
    .type-btn.active .type-name { color: var(--accent); }

    /* ===== FORM INPUTS ===== */
    .input-group { margin-bottom: 12px; }
    .input-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .input-label .req { color: var(--accent); margin-left: 2px; }
    .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }

    input[type="text"], textarea {
      width: 100%;
      background: #111;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      padding: 12px 14px;
      outline: none;
      transition: border-color 0.18s;
      resize: none;
    }
    input[type="text"]::placeholder, textarea::placeholder { color: #444; }
    input[type="text"]:focus, textarea:focus { border-color: var(--accent); }
    textarea { min-height: 76px; line-height: 1.6; }

    /* ===== GENERATE BUTTON ===== */
    .btn-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 16px;
    }
    .btn-generate {
      flex: 1;
      padding: 14px;
      background: var(--accent);
      color: #fff;
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-generate:hover { opacity: 0.88; }
    .btn-generate:disabled { opacity: 0.4; cursor: not-allowed; }
    .remaining-count {
      font-size: 12px;
      color: var(--muted);
      text-align: right;
      margin-top: 10px;
    }

    /* ===== LOADING ===== */
    .loading-wrap { text-align: center; padding: 40px 0; display: none; }
    .loading-wrap.show { display: block; }
    .spinner {
      width: 26px; height: 26px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-wrap p { font-size: 13px; color: var(--muted); }
    .loading-wrap .loading-step {
      margin-top: 8px;
      font-size: 12px;
      color: var(--accent);
      font-weight: 600;
    }

    /* ===== RESULT BOX ===== */
    .result-area { display: none; }
    .result-area.show { display: block; animation: fadeUp 0.3s ease; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }

    .result-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 12px;
      overflow: hidden;
    }
    .result-card-header {
      padding: 14px 20px;
      background: rgba(255,255,255,0.03);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .result-card-header h3 {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .result-card-body { padding: 20px; }

    .result-title-text {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.4;
    }
    .result-text {
      font-size: 15px;
      line-height: 1.9;
      white-space: pre-wrap;
      word-break: keep-all;
      color: var(--text);
    }
    .result-tags-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .result-tag-item {
      font-size: 12px;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 20px;
      background: var(--accent-light);
      color: var(--accent);
      letter-spacing: 0.3px;
    }

    /* Meta description & FAQ (Google SEO only) */
    .google-seo-only { display: none; }
    .google-seo-only.show { display: block; }

    .faq-item { margin-bottom: 16px; }
    .faq-item:last-child { margin-bottom: 0; }
    .faq-q {
      font-size: 14px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 4px;
    }
    .faq-a {
      font-size: 14px;
      line-height: 1.7;
      color: var(--text);
    }

    /* Copy buttons */
    .copy-btn {
      font-size: 12px;
      color: var(--muted);
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      padding: 5px 14px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.18s;
    }
    .copy-btn:hover { color: var(--text); border-color: var(--text); }
    .copy-btn.copied { color: #4ade80; border-color: #4ade80; }

    .btn-copy-all {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: #fff;
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-bottom: 10px;
    }
    .btn-copy-all:hover { opacity: 0.88; }

    .btn-reset {
      width: 100%;
      padding: 14px;
      background: transparent;
      color: var(--muted);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.18s;
    }
    .btn-reset:hover { border-color: var(--text); color: var(--text); }

    /* ===== FOOTER ===== */
    footer {
      border-top: 1px solid var(--border);
      padding: 20px 24px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
    }
    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--text); }

    /* ===== ERROR ===== */
    .error-box {
      display: none;
      background: rgba(239,68,68,0.1);
      border: 1.5px solid rgba(239,68,68,0.4);
      border-radius: 8px;
      padding: 14px 18px;
      margin-bottom: 12px;
      font-size: 13px;
      color: #f87171;
    }
    .error-box.show { display: block; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 600px) {
      .type-grid.three-col {
        grid-template-columns: 1fr;
      }
      .type-grid {
        grid-template-columns: 1fr 1fr;
      }
      .input-row {
        grid-template-columns: 1fr;
      }
      .nav-links { gap: 12px; }
      .nav-links a { font-size: 12px; }
      main { padding: 32px 16px 80px; }
      .card { padding: 18px; }
      .result-card-body { padding: 16px; }
    }
  </style>
</head>
<body>

<header>
  <a href="/" class="logo">뚝딱<em>툴</em></a>
  <nav class="nav-links">
    <a href="/index.html">블로그 제목</a>
    <a href="/hook-generator.html">후킹문구</a>
    <a href="/blog-writer.html" class="active">블로그 글</a>
    <a href="/column.html">칼럼</a>
  </nav>
</header>

<main>
  <!-- 페이지 헤더 -->
  <div class="page-header">
    <h1>블로그 글 작성기</h1>
    <p>업종과 주제만 입력하면 상위노출에 최적화된 블로그 글을 뚝딱 만들어드려요.</p>
  </div>

  <!-- 입력 폼 섹션 -->
  <div id="form-section">

    <!-- 카드 1: 글 유형 -->
    <div class="card">
      <div class="card-label">글 유형</div>
      <div class="type-grid three-col">
        <button class="type-btn active" data-type="homefeed" onclick="selectType(this)">
          <span class="type-icon">📱</span>
          <span class="type-name">네이버 홈피드</span>
          <span class="type-desc">홈 탭 AI 추천 노출용</span>
        </button>
        <button class="type-btn" data-type="naver-seo" onclick="selectType(this)">
          <span class="type-icon">🔍</span>
          <span class="type-name">네이버 SEO</span>
          <span class="type-desc">검색(VIEW) 상위노출</span>
        </button>
        <button class="type-btn" data-type="google-seo" onclick="selectType(this)">
          <span class="type-icon">🌐</span>
          <span class="type-name">구글 SEO</span>
          <span class="type-desc">구글 검색 상위노출</span>
        </button>
      </div>
    </div>

    <!-- 카드 2: 톤 선택 -->
    <div class="card">
      <div class="card-label">톤 선택</div>
      <div class="type-grid">
        <button class="type-btn active" data-tone="친근한 구어체" onclick="selectTone(this)">
          <span class="type-name">😊 친근한 구어체</span>
          <span class="type-desc">~거든요, ~더라고요 (편한 대화체)</span>
        </button>
        <button class="type-btn" data-tone="전문가 톤" onclick="selectTone(this)">
          <span class="type-name">💼 전문가 톤</span>
          <span class="type-desc">~합니다, 신뢰감 있는 서술체</span>
        </button>
        <button class="type-btn" data-tone="스토리텔링" onclick="selectTone(this)">
          <span class="type-name">📖 스토리텔링</span>
          <span class="type-desc">에피소드 중심, 감정 변화 흐름</span>
        </button>
        <button class="type-btn" data-tone="간결 실용체" onclick="selectTone(this)">
          <span class="type-name">⚡ 간결 실용체</span>
          <span class="type-desc">핵심만, 불필요한 수식어 제거</span>
        </button>
      </div>
    </div>

    <!-- 카드 3: CTA 선택 -->
    <div class="card">
      <div class="card-label">마무리 CTA</div>
      <div class="type-grid">
        <button class="type-btn active" data-cta="상담/예약 유도" onclick="selectCta(this)">
          <span class="type-name">📞 상담/예약 유도</span>
          <span class="type-desc">카톡·전화 문의 전환</span>
        </button>
        <button class="type-btn" data-cta="방문 유도" onclick="selectCta(this)">
          <span class="type-name">📍 방문 유도</span>
          <span class="type-desc">오프라인 매장 방문 유도</span>
        </button>
        <button class="type-btn" data-cta="공감 마무리" onclick="selectCta(this)">
          <span class="type-name">💬 공감 마무리</span>
          <span class="type-desc">하드셀 없이 자연스럽게</span>
        </button>
        <button class="type-btn" data-cta="직접 입력" onclick="selectCta(this)">
          <span class="type-name">✏️ 직접 입력</span>
          <span class="type-desc">원하는 CTA 직접 작성</span>
        </button>
      </div>
      <div class="input-group cta-custom-wrap" id="cta-custom-wrap" style="margin-top: 12px; display: none;">
        <input type="text" id="cta-custom" placeholder="예: 네이버 예약으로 10% 할인 받으세요" maxlength="60" />
      </div>
    </div>

    <!-- 카드 4: 내용 입력 -->
    <div class="card">
      <div class="card-label">내용 입력</div>

      <div class="input-row">
        <div class="input-group">
          <label class="input-label">업종 <span class="req">*</span></label>
          <input type="text" id="industry" placeholder="예: 미용실, 카페, 필라테스" maxlength="20" />
        </div>
        <div class="input-group">
          <label class="input-label">주제/키워드 <span class="req">*</span></label>
          <input type="text" id="topic" placeholder="예: 손톱 관리법, 다이어트 식단" maxlength="30" />
        </div>
      </div>

      <div class="input-group">
        <label class="input-label">지역 <span style="color:#555; font-weight:400;">(선택)</span></label>
        <input type="text" id="location" placeholder="예: 강남, 홍대, 부산 서면" maxlength="20" />
      </div>

      <div class="input-group" style="margin-top: 12px;">
        <label class="input-label">추가 요청사항 <span style="color:#555; font-weight:400;">(선택)</span></label>
        <textarea id="memo" placeholder="예: 국산 재료만 사용한다는 점 강조, 직접 경험 위주로 작성"></textarea>
      </div>
    </div>

    <!-- 에러 박스 -->
    <div class="error-box" id="error-box"></div>

    <!-- 생성 버튼 -->
    <div class="btn-row">
      <button class="btn-generate" id="btn-generate" onclick="generate()">✦ 블로그 글 생성하기</button>
    </div>
    <div class="remaining-count" id="remainingCount">남은 횟수 확인 중...</div>

  </div>

  <!-- 로딩 -->
  <div class="loading-wrap" id="loading">
    <div class="spinner"></div>
    <p>AI가 블로그 글을 작성하고 있습니다...</p>
    <div class="loading-step" id="loading-step">SEO 키워드 분석 중...</div>
  </div>

  <!-- 결과 영역 -->
  <div class="result-area" id="result">

    <!-- 제목 -->
    <div class="result-card">
      <div class="result-card-header">
        <h3>제목</h3>
        <button class="copy-btn" onclick="copySection('result-title', this)">복사</button>
      </div>
      <div class="result-card-body">
        <div class="result-title-text" id="result-title"></div>
      </div>
    </div>

    <!-- 메타 디스크립션 (구글 SEO 전용) -->
    <div class="result-card google-seo-only" id="meta-desc-card">
      <div class="result-card-header">
        <h3>메타 디스크립션</h3>
        <button class="copy-btn" onclick="copySection('result-meta-desc', this)">복사</button>
      </div>
      <div class="result-card-body">
        <div class="result-text" id="result-meta-desc"></div>
      </div>
    </div>

    <!-- 도입부/후킹 -->
    <div class="result-card">
      <div class="result-card-header">
        <h3>도입부</h3>
        <button class="copy-btn" onclick="copySection('result-hook', this)">복사</button>
      </div>
      <div class="result-card-body">
        <div class="result-text" id="result-hook"></div>
      </div>
    </div>

    <!-- 본문 -->
    <div class="result-card">
      <div class="result-card-header">
        <h3>본문</h3>
        <button class="copy-btn" onclick="copySection('result-body', this)">복사</button>
      </div>
      <div class="result-card-body">
        <div class="result-text" id="result-body"></div>
      </div>
    </div>

    <!-- FAQ (구글 SEO 전용) -->
    <div class="result-card google-seo-only" id="faq-card">
      <div class="result-card-header">
        <h3>FAQ</h3>
        <button class="copy-btn" onclick="copySection('result-faq', this)">복사</button>
      </div>
      <div class="result-card-body">
        <div class="result-text" id="result-faq"></div>
      </div>
    </div>

    <!-- 마무리 CTA -->
    <div class="result-card">
      <div class="result-card-header">
        <h3>마무리</h3>
        <button class="copy-btn" onclick="copySection('result-cta', this)">복사</button>
      </div>
      <div class="result-card-body">
        <div class="result-text" id="result-cta"></div>
      </div>
    </div>

    <!-- 해시태그 -->
    <div class="result-card">
      <div class="result-card-header">
        <h3>해시태그</h3>
        <button class="copy-btn" onclick="copySection('result-tags', this)">복사</button>
      </div>
      <div class="result-card-body">
        <div class="result-tags-wrap" id="result-tags"></div>
      </div>
    </div>

    <!-- 전체 복사 + 다시 쓰기 -->
    <button class="btn-copy-all" id="btn-copy-all" onclick="copyAll()">전체 글 한 번에 복사</button>
    <button class="btn-reset" onclick="resetForm()">다른 주제로 다시 쓰기</button>
  </div>

</main>

<footer>
  <a href="/">뚝딱툴</a> &nbsp;&middot;&nbsp;
  <a href="/about.html">소개</a> &nbsp;&middot;&nbsp;
  <a href="/privacy.html">개인정보처리방침</a>
</footer>

<script>
  /* ========================================
     개발자 2 (JS 담당): System 프롬프트 + 톤 가이드 + API 호출 + 결과 렌더링
     ======================================== */

    '간결 실용체': TONE_4_GUIDE
  };

  // ─── 로딩 스텝 메시지 ───
  const loadingSteps = [
    '\uD83D\uDCDD SEO 키워드 분석 중...',
    '\uD83D\uDD0D 검색 의도 파악 중...',
    '\u270D\uFE0F 후킹 도입부 작성 중...',
    '\uD83D\uDCC4 본문 구성 중...',
    '\uD83C\uDFF7 해시태그 추출 중...',
  ];

  // ─── XSS 방지용 escape 함수 ───
  function escapeHtml(str) {
    var div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // ─── 글 유형 선택 — UI 토글 ───
  function selectType(btn) {
    document.querySelectorAll('.type-btn[data-type]').forEach(function(b) {
      b.classList.remove('active');
    });
    btn.classList.add('active');
    selectedType = btn.dataset.type;

    // 구글 SEO 선택 시 전용 결과 섹션 표시/숨김
    var googleSeoCards = document.querySelectorAll('.google-seo-only');
    googleSeoCards.forEach(function(card) {
      if (selectedType === 'google-seo') {
        card.classList.add('show');
      } else {
        card.classList.remove('show');
      }
    });
  }

  // ─── 톤 선택 — UI 토글 ───
  function selectTone(btn) {
    document.querySelectorAll('.type-btn[data-tone]').forEach(function(b) {
      b.classList.remove('active');
    });
    btn.classList.add('active');
    selectedTone = btn.dataset.tone;
  }

  // ─── CTA 선택 — UI 토글 ───
  function selectCta(btn) {
    document.querySelectorAll('.type-btn[data-cta]').forEach(function(b) {
      b.classList.remove('active');
    });
    btn.classList.add('active');
    selectedCta = btn.dataset.cta;
    var customWrap = document.getElementById('cta-custom-wrap');
    if (selectedCta === '직접 입력') {
      customWrap.style.display = 'block';
      document.getElementById('cta-custom').focus();
    } else {
      customWrap.style.display = 'none';
    }
  }

  // ─── 에러 표시/숨기기 ───
  function showError(msg) {
    var el = document.getElementById('error-box');
    el.textContent = msg;
    el.classList.add('show');
  }

  function hideError() {
    document.getElementById('error-box').classList.remove('show');
  }

  // ─── 로딩 스텝 애니메이션 ───
  function startLoadingSteps() {
    var stepEl = document.getElementById('loading-step');
    if (!stepEl) return;
    var idx = 0;
    stepEl.textContent = loadingSteps[0];
    loadingInterval = setInterval(function() {
      idx = (idx + 1) % loadingSteps.length;
      stepEl.textContent = loadingSteps[idx];
    }, 2500);
  }

  function stopLoadingSteps() {
    if (loadingInterval) {
      clearInterval(loadingInterval);
      loadingInterval = null;
    }
  }

  // ─── 결과 렌더링 ───
  function renderResult(data) {
    generatedData = data;

    // 제목
    document.getElementById('result-title').textContent = data.title || '';

    // 도입부 (XSS escape 후 줄바꿈 변환)
    document.getElementById('result-hook').innerHTML = escapeHtml(data.hook || '').replace(/\n\n/g, '<br><br>');

    // 본문
    document.getElementById('result-body').innerHTML = escapeHtml(data.body || '').replace(/\n\n/g, '<br><br>');

    // 마무리
    document.getElementById('result-cta').innerHTML = escapeHtml(data.cta || '').replace(/\n\n/g, '<br><br>');

    // 해시태그
    var tagsWrap = document.getElementById('result-tags');
    tagsWrap.innerHTML = '';
    if (data.tags && Array.isArray(data.tags)) {
      data.tags.forEach(function(tag) {
        var span = document.createElement('span');
        span.className = 'result-tag-item';
        span.textContent = tag.startsWith('#') ? tag : '#' + tag;
        tagsWrap.appendChild(span);
      });
    }

    // 구글 SEO 전용 섹션 처리
    var googleSeoCards = document.querySelectorAll('.google-seo-only');
    if (selectedType === 'google-seo') {
      googleSeoCards.forEach(function(card) { card.classList.add('show'); });

      // 메타 디스크립션
      document.getElementById('result-meta-desc').innerHTML = escapeHtml(data.meta_description || '').replace(/\n\n/g, '<br><br>');

      // FAQ
      document.getElementById('result-faq').innerHTML = escapeHtml(data.faq || '').replace(/\n\n/g, '<br><br>').replace(/\n/g, '<br>');
    } else {
      googleSeoCards.forEach(function(card) { card.classList.remove('show'); });
      document.getElementById('result-meta-desc').innerHTML = '';
      document.getElementById('result-faq').innerHTML = '';
    }

    // 결과 영역 표시 + 폼 숨기기
    document.getElementById('form-section').style.display = 'none';
    document.getElementById('result').classList.add('show');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ─── 메인 생성 함수 ───
  async function generate() {
    hideError();

    var industry = document.getElementById('industry').value.trim();
    var topic = document.getElementById('topic').value.trim();
    var location = document.getElementById('location').value.trim();
    var memo = document.getElementById('memo').value.trim();

    // 유효성 검사
    if (!industry) { showError('업종을 입력해주세요.'); return; }
    if (!topic) { showError('주제/키워드를 입력해주세요.'); return; }

    // UI 상태 전환: 로딩
    var btn = document.getElementById('btn-generate');
    btn.disabled = true;
    document.getElementById('loading').classList.add('show');
    document.getElementById('result').classList.remove('show');
    startLoadingSteps();

    // system 프롬프트 선택
    var systemPrompt = systemPrompts[selectedType];

    // CTA 텍스트 결정
    var ctaText = selectedCta;
    if (selectedCta === '직접 입력') {
      var customCta = document.getElementById('cta-custom').value.trim();
      ctaText = customCta || '자연스러운 마무리';
    }

    // user 메시지 조립
    var userParts = [];
    userParts.push('업종: ' + industry);
    if (location) {
      userParts.push('지역: ' + location);
    }
    userParts.push('오늘의 소재: ' + topic);
    userParts.push('마무리 CTA: ' + ctaText);
    if (memo) {
      userParts.push('핵심 내용: ' + memo);
    }
    userParts.push('톤: ' + selectedTone);
    userParts.push('');
    userParts.push(toneGuides[selectedTone]);

    var userMessage = userParts.join('\n');

    try {
      var res = await fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 8192,
          system: systemPrompt,
          messages: [{ role: 'user', content: userMessage }]
        })
      });

      // 응답이 JSON인지 확인
      var data;
      var contentType = res.headers.get('content-type') || '';
      if (contentType.indexOf('application/json') === -1) {
        throw new Error('서버 응답 오류 (HTTP ' + res.status + '). 잠시 후 다시 시도해주세요.');
      }
      data = await res.json();

      // 429 에러 (하루 제한 초과)
      if (res.status === 429) {
        var limitMsg = (typeof data.error === 'string') ? data.error : '오늘 사용 가능 횟수를 초과했습니다. 내일 다시 시도해주세요.';
        showError(limitMsg);
        return;
      }

      // 기타 에러
      if (!res.ok || data.error) {
        var errMsg;
        if (typeof data.error === 'string') {
          errMsg = data.error;
        } else if (data.error && data.error.error && data.error.error.message) {
          errMsg = data.error.error.message;
        } else if (data.error && data.error.message) {
          errMsg = data.error.message;
        } else {
          errMsg = 'API 오류가 발생했습니다 (HTTP ' + res.status + '). 잠시 후 다시 시도해주세요.';
        }
        throw new Error(errMsg);
      }

      // 응답에서 텍스트 추출
      var rawText = (data.content && data.content[0] && data.content[0].text) || '';
      if (!rawText) {
        throw new Error('AI 응답이 비어있습니다. 다시 시도해주세요.');
      }

      // ```json ... ``` 마크다운 코드블록 제거
      rawText = rawText.replace(/^```json\s*/i, '').replace(/^```\s*/i, '').replace(/\s*```$/i, '').trim();

      // JSON 파싱
      var parsed;
      try {
        parsed = JSON.parse(rawText);
      } catch (parseErr) {
        // JSON 블록만 추출 시도
        var jsonMatch = rawText.match(/\{[\s\S]*\}/);
        if (jsonMatch) {
          parsed = JSON.parse(jsonMatch[0]);
        } else {
          throw new Error('AI 응답을 파싱할 수 없습니다. 다시 시도해주세요.');
        }
      }

      // 결과 렌더링
      renderResult(parsed);

      // 남은 횟수 갱신
      if (typeof data.remaining === 'number') {
        updateRemainingUI(data.remaining);
      }

    } catch (err) {
      showError(err.message || '알 수 없는 오류가 발생했습니다.');
    } finally {
      btn.disabled = false;
      document.getElementById('loading').classList.remove('show');
      stopLoadingSteps();
    }
  }

  // ─── 개별 섹션 복사 ───
  function copySection(id, btn) {
    var el = document.getElementById(id);
    var text = '';
    if (id === 'result-tags') {
      text = Array.from(el.querySelectorAll('.result-tag-item')).map(function(t) { return t.textContent; }).join(' ');
    } else {
      text = el.textContent;
    }
    if (!text) return;
    navigator.clipboard.writeText(text).then(function() {
      btn.textContent = '\u2713 복사됨';
      btn.classList.add('copied');
      setTimeout(function() {
        btn.textContent = '복사';
        btn.classList.remove('copied');
      }, 2000);
    });
  }

  // ─── 전체 글 복사 ───
  function copyAll() {
    if (!generatedData) return;

    var parts = [];

    // 제목
    if (generatedData.title) {
      parts.push(generatedData.title);
      parts.push('');
    }

    // 메타 디스크립션 (구글 SEO 전용)
    if (selectedType === 'google-seo' && generatedData.meta_description) {
      parts.push('[메타 디스크립션]');
      parts.push(generatedData.meta_description);
      parts.push('');
    }

    // 도입부
    if (generatedData.hook) {
      parts.push(generatedData.hook);
      parts.push('');
    }

    // 본문
    if (generatedData.body) {
      parts.push(generatedData.body);
      parts.push('');
    }

    // FAQ (구글 SEO 전용)
    if (selectedType === 'google-seo' && generatedData.faq) {
      parts.push('[FAQ]');
      parts.push(generatedData.faq);
      parts.push('');
    }

    // 마무리
    if (generatedData.cta) {
      parts.push(generatedData.cta);
      parts.push('');
    }

    // 해시태그
    if (generatedData.tags && Array.isArray(generatedData.tags)) {
      var tagsText = generatedData.tags.map(function(tag) {
        return tag.startsWith('#') ? tag : '#' + tag;
      }).join(' ');
      parts.push(tagsText);
    }

    var fullText = parts.join('\n');
    var copyBtn = document.getElementById('btn-copy-all');

    navigator.clipboard.writeText(fullText).then(function() {
      copyBtn.textContent = '\u2713 복사 완료!';
      setTimeout(function() {
        copyBtn.textContent = '전체 글 한 번에 복사';
      }, 2000);
    });
  }

  // ─── 폼 초기화 (다시 쓰기) ───
  function resetForm() {
    generatedData = null;
    document.getElementById('result').classList.remove('show');
    document.getElementById('form-section').style.display = '';
    document.getElementById('memo').value = '';
    document.getElementById('topic').value = '';
    document.getElementById('location').value = '';
    document.getElementById('industry').value = '';
    document.getElementById('cta-custom').value = '';
    document.getElementById('cta-custom-wrap').style.display = 'none';
    hideError();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ─── 남은 횟수 UI 업데이트 ───
  function updateRemainingUI(remaining) {
    var el = document.getElementById('remainingCount');
    el.textContent = '오늘 남은 횟수: ' + remaining + '회';
    el.style.color = remaining <= 1 ? '#ff5f1f' : '#888';
  }

  // ─── 남은 횟수 로드 ───
  async function loadRemaining() {
    try {
      var res = await fetch('/api/generate');
      var data = await res.json();
      updateRemainingUI(data.remaining);
    } catch(e) {
      document.getElementById('remainingCount').textContent = '';
    }
  }

  loadRemaining();

  // ─── Ctrl+Enter / Cmd+Enter 단축키 ───
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) generate();
  });
</script>

</body>
